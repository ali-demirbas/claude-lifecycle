<!--
  claude-lifecycle COPY CANVAS output template — THE mandatory copy-output format,
  the copy-side counterpart to templates/canvas.html.
  Design: tab per journey + one card per step, each card showing the step's intent,
  one or more copy variants (fields + real character counts against the channel
  limit), a fallback block, and a review-status badge. Never a KPI table, never a
  data-gaps section — those don't belong here (see CLAUDE.md rule 2 and the output-
  authoring conventions it links to).
  The engine reproduces this file EXACTLY, replacing only the JOURNEYS data array,
  the <title>, and the header eyebrow/h1/lede text. Do NOT redesign; do not add extra views.
  User-facing naming rule: title/header follow the USER'S language, and never use the
  word "copy" for Turkish users (it reads as "duplicate") — TR: "İletişim Metinleri", EN: "Message Copy".
-->
<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Message Copy</title>
<style>
  :root {
    --page-bg: #faf7f2;
    --card-header: #b0693f;
    --card-header-ink: #ffffff;
    --card-body: #ffffff;
    --card-line: #e6ddd0;
    --ink: #241d17;
    --ink-dim: #7a6b5a;
    --pill: #fbeee4;
    --pill-ink: #b0693f;
    --good: #2d6a3e;
    --shadow: 0 1px 2px rgba(90,60,30,0.06), 0 10px 24px rgba(90,60,30,0.08);
    --font-display: Georgia, "Iowan Old Style", "Times New Roman", serif;
    --font-body: -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: "SF Mono", "JetBrains Mono", ui-monospace, Menlo, monospace;
  }
  :root[data-theme="dark"] {
    --page-bg: #1c1712; --card-header: #d99a6f; --card-header-ink: #241d17;
    --card-body: #2a231d; --card-line: #3d3226; --ink: #f3ece0; --ink-dim: #b3a390;
    --pill: #3a2c1f; --pill-ink: #d99a6f; --good: #7cc491;
    --shadow: 0 2px 6px rgba(0,0,0,0.35), 0 12px 30px rgba(0,0,0,0.4);
  }
  @media (prefers-color-scheme: dark) {
    :root:not([data-theme="light"]) {
      --page-bg: #1c1712; --card-header: #d99a6f; --card-header-ink: #241d17;
      --card-body: #2a231d; --card-line: #3d3226; --ink: #f3ece0; --ink-dim: #b3a390;
      --pill: #3a2c1f; --pill-ink: #d99a6f; --good: #7cc491;
      --shadow: 0 2px 6px rgba(0,0,0,0.35), 0 12px 30px rgba(0,0,0,0.4);
    }
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--page-bg); color: var(--ink); font-family: var(--font-body); display: flex; justify-content: center; -webkit-font-smoothing: antialiased; }
  .wrap { max-width: 780px; padding: 32px 24px 48px; width: 100%; }

  .eyebrow { font-family: var(--font-mono); font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--card-header); margin: 0 0 8px; }
  h1 { font-family: var(--font-display); font-weight: 700; font-size: 25px; letter-spacing: -0.01em; margin: 0 0 6px; }
  .lede { color: var(--ink-dim); font-size: 13.5px; line-height: 1.55; margin: 0 0 20px; }

  .tabs { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 24px; }
  .tab { font-family: var(--font-body); font-size: 12.5px; font-weight: 600; color: var(--ink-dim); background: var(--card-body); border: 1.5px solid var(--card-line); border-radius: 10px; padding: 8px 12px; cursor: pointer; }
  .tab.active { border-color: var(--card-header); background: var(--pill); color: var(--ink); }

  .panel { display: none; }
  .panel.active { display: block; }

  .step-card { background: var(--card-body); border: 1.5px solid var(--card-line); border-radius: 14px; box-shadow: var(--shadow); margin-bottom: 18px; overflow: hidden; }
  .step-head { background: var(--card-header); color: var(--card-header-ink); padding: 11px 16px; display: flex; align-items: center; justify-content: space-between; font-size: 12.5px; font-weight: 700; }
  .step-head .tag { font-family: var(--font-mono); font-weight: 600; font-size: 10.5px; opacity: 0.9; }
  .pass-badge { background: rgba(255,255,255,0.18); color: #fff; font-family: var(--font-mono); font-size: 10px; font-weight: 700; padding: 3px 8px; border-radius: 100px; }
  .pass-badge.fix { background: #9c3b2e; }
  .pass-badge.legal { background: #b45309; }

  .step-body { padding: 14px 16px 4px; }
  .intent { font-size: 12.5px; color: var(--ink-dim); margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px dashed var(--card-line); }
  .intent b { color: var(--ink); }

  .variant { margin-bottom: 14px; }
  .variant-label { font-family: var(--font-mono); font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; color: var(--pill-ink); background: var(--pill); display: inline-block; padding: 3px 9px; border-radius: 100px; margin-bottom: 7px; }
  .field-row { display: grid; grid-template-columns: 80px 1fr 62px; gap: 8px; font-size: 12px; padding: 5px 0; border-bottom: 1px dashed var(--card-line); align-items: start; }
  .field-row:last-child { border-bottom: none; }
  .field-label { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; color: var(--ink-dim); padding-top: 2px; }
  .field-content { line-height: 1.45; min-width: 0; overflow-wrap: anywhere; }
  .char-count { font-family: var(--font-mono); font-size: 10px; color: var(--good); text-align: right; padding-top: 2px; white-space: nowrap; }

  .fallback { font-size: 11.5px; color: var(--ink-dim); padding-top: 8px; border-top: 1px solid var(--card-line); margin-top: 4px; }
  .fallback b { font-family: var(--font-mono); font-size: 9.5px; text-transform: uppercase; }
  .review-note { font-size: 11.5px; color: #b45309; padding-top: 8px; }

  code.variable { font-family: var(--font-mono); font-size: 10px; font-weight: 600; background: var(--pill); color: var(--pill-ink); padding: 1px 4px; border-radius: 4px; }
</style>
</head>
<body>
<div class="wrap">
  <p class="eyebrow">claude-lifecycle · copy-output</p>
  <h1>Kanal Metinleri</h1>
  <p class="lede">Her sekme bir journey'in gerçek gönderim metnini gösterir: varyantlar, karakter sayıları, inceleme durumu. Journey canvas'ındaki her kartın "Copy doc" referansı burada karşılık bulur.</p>

  <div class="tabs" id="tabs"></div>
  <div id="panels"></div>
</div>
<script>
// Placeholder example data — the engine replaces this array entirely per run.
// Shape: one entry per journey; each journey has `steps`; each step has one or
// more `variants` (omit the label/second variant for a single-variant step);
// `fields` is [label, content, "count/limit" or bare count for in-app/no-limit
// fields]; `fallback` and `note` are optional per step.
const JOURNEYS = [
  {
    id: "example-journey", label: "Örnek Journey",
    steps: [
      { tag: "Adım 1 · Email · +1sa", intent: "Tek cümlelik adım niyeti, review tarafından değiştirilmez",
        review: "pass",
        variants: [
          { label: "Variant A · direct-utility", fields: [
            ["Konu", "Örnek konu satırı", "18/50"],
            ["Ön izleme", "Örnek ön izleme metni, konuyu tekrar etmez", "44/90"],
            ["Gövde", "Örnek gövde metni, <code class=\"variable\">{{first_name}}</code> gibi değişkenler kullanır.", "58/350"],
            ["CTA", "Şimdi bak", "9/20"]
          ]},
          { label: "Variant B · farklı açı", fields: [
            ["Konu", "İkinci varyant konu satırı", "27/50"],
            ["Ön izleme", "Farklı bir açıdan aynı niyeti anlatır", "38/90"],
            ["Gövde", "İkinci varyantın gövdesi, farklı bir ikna çerçevesi kullanır.", "57/350"],
            ["CTA", "İncele", "6/20"]
          ]}
        ],
        fallback: "Kişiselleştirme değişkeni olmadan güvenle gönderilebilecek en kısa versiyon."
      },
      { tag: "Adım 2 · SMS · +3gün", intent: "Tek alanlı kanal, opt-out dahil sayılır",
        review: "pass",
        variants: [
          { label: "Tek varyant", fields: [
            ["Gövde", "Marka: kısa mesaj + link + opt-out metni tek satırda.", "68/70"]
          ]}
        ]
      }
    ]
  }
];

function badgeClass(review) {
  if (review === "fix") return "pass-badge fix";
  if (review === "legal") return "pass-badge legal";
  return "pass-badge";
}
function badgeLabel(review) {
  if (review === "fix") return "⚠️ Not ile geçti";
  if (review === "legal") return "⚖️ Hukuki inceleme";
  return "✅ Geçti";
}

function render() {
  const tabsEl = document.getElementById('tabs');
  const panelsEl = document.getElementById('panels');
  tabsEl.innerHTML = '';
  panelsEl.innerHTML = '';
  JOURNEYS.forEach((j, idx) => {
    const tab = document.createElement('button');
    tab.className = 'tab' + (idx === 0 ? ' active' : '');
    tab.textContent = j.label;
    tab.onclick = () => {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      tab.classList.add('active');
